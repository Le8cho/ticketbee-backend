name: Deploy Functions

on:
  push:
    branches:
      - main
    paths:
      - "azure_functions/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - dir: fn_file_ticket
            app_name: func-techfix-fn-file-ticket-2026
          - dir: fn_notify_ticket
            app_name: func-techfix-fn-notify-ticket-2026
          - dir: fn_warranty
            app_name: func-techfix-fn-warranty-2026

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies into the deployment package
        run: |
          cd azure_functions/${{ matrix.dir }}
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ matrix.app_name }}
          package: azure_functions/${{ matrix.dir }}
